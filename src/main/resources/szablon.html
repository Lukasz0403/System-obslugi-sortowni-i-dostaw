<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: "DejaVu Sans", sans-serif;
        }
        #main {
            width: 400px;
            height: 600px;
            margin: 5px;
        }

        #main, tr, td {
            border: 1px solid black;
            border-collapse: collapse;
            height: 150px;
        }

        img#qr {
            width: 200px;
            height: 200px;
            float: left;
            margin-left: 10px;
            margin-bottom: 20px;
        }

        img#logo {
            width: 130px;
            height: 130px;
        }

        p.kurier {
            font-weight: bold;
            font-size: smaller;
            margin-top: 2px;
            position: absolute;
            top: 40px;
            left: 25px;
        }
        p.kurier2 {
            font-weight: bold;
            font-size: smaller;
            margin-top: 2px;
            position: absolute;
            top: 40px;
            left: 290px;
        }
        p.uwagi {
            position: absolute;
            font-size: small;
            top: 480px;
            left: 30px;
            font-weight: bold;
        }

        td {
            width: 133px;
            height: 150px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
        }

        sub {
            font-weight: normal;
            font-size: small;
        }

        p.adresy {
            font-size: small;
            margin: 10px;
            text-align: left;
        }

        p#id {
            transform: rotate(90deg);
            text-align: center;
            position: absolute;
            top: 300px;
            left: -40px;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <table id="main">
        <tr>
            <td>
                <p class="kurier">Rejon kurierski:</p>
                <h1 id="region">G70</h1>
            </td>
            <td><img id="logo" src="logo.png"></td>
            <td>
                <p class="kurier2">Destynacja:</p>
                <h1 id="regionDest"><sub>PL/</sub>WA2</h1>
            </td>
        </tr>
        <tr>
            <td colspan="3" rowspan="2">
                <img id="qr" src="qrcode.png">
                <p class="adresy" id="nadawca">INPOST<br>tel. 888000000<br>email: test@inpost.pl<br>PANA TADEUSZA 4<br>30-722 KRAKÓW</p>
                <p class="adresy" id="odbiorca">NAZWA FIRMY<br>tel. 123473456<br>email: test@onet.pl<br>CZERNIAKOWSKA 87A<br>00-728 WARSZAWA</p>
            </td>
        </tr>
        <tr>
            <br>
        </tr>
        <tr>
            <td colspan="3"><p class="uwagi">Uwagi nadawcy: </p></td>
        </tr>
    </table>
</body>
</html>
